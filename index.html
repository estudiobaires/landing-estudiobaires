<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Estudio Baires · Adriana Burgos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --wine:       #80141d;
  --wine-mid:   #a01a24;
  --wine-light: #f5e8e9;
  --wine-pale:  #fdf6f6;
  --green:      #25D366;
  --green-dark: #1ebe5d;
  --dark:       #1a1a1a;
  --gray-1:     #f7f6f6;
  --gray-2:     #eeecec;
  --gray-3:     #c8c4c4;
  --gray-4:     #8a8585;
  --gray-5:     #4a4646;
  --white:      #ffffff;
  --radius:     14px;
  --shadow:     0 2px 8px rgba(0,0,0,0.07);
}

html, body {
  background: var(--gray-1);
  font-family: 'DM Sans', sans-serif;
  color: var(--dark);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── PAGE ── */
.page {
  max-width: 430px;
  margin: 0 auto;
  padding: 2.25rem 1rem 4rem;
}

/* ── HEADER ── */
.header { text-align: center; margin-bottom: 2rem; }

.logo-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 0.85rem;
}

.logo-pill img { width: 200px; height: auto; display: block; }

.header-city {
  font-size: 11.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gray-4);
  font-weight: 400;
  margin-bottom: 3px;
}

.header-tagline {
  font-size: 15.5px;
  font-weight: 500;
  color: var(--wine);
  letter-spacing: 0.01em;
}

/* ── FULL-WIDTH BUTTONS (web + whatsapp) ── */
.btn-full {
  display: flex;
  align-items: center;
  gap: 13px;
  width: 100%;
  padding: 0.9rem 1rem;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  text-decoration: none;
  transition: filter 0.15s;
  margin-bottom: 10px;
}

.btn-full:hover { filter: brightness(1.06); }
.btn-full:active { filter: brightness(0.95); }

.btn-full.web { background: var(--wine); }
.btn-full.wsp { background: var(--green); }

.btn-full .f-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: rgba(255,255,255,0.18);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.btn-full .f-icon i { font-size: 20px; color: #fff; }

.btn-full .f-text { flex: 1; }
.btn-full .f-title { display: block; font-size: 15px; font-weight: 500; color: #fff; }
.btn-full .f-sub   { display: block; font-size: 12px; color: rgba(255,255,255,0.78); margin-top: 1px; }

.btn-full .f-arrow { color: rgba(255,255,255,0.6); font-size: 18px; flex-shrink: 0; }

/* ── SECTION LABEL ── */
.section-label {
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.11em;
  text-transform: uppercase;
  color: var(--gray-3);
  margin: 1.75rem 0 0.6rem 1px;
}

/* ── LIST CARD ── */
.card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 1rem;
  border: 1px solid rgba(0,0,0,0.04);
}

.list-btn {
  display: flex;
  align-items: center;
  gap: 13px;
  width: 100%;
  padding: 0.9rem 1rem;
  background: var(--white);
  border: none;
  cursor: pointer;
  text-align: left;
  text-decoration: none;
  color: var(--dark);
  transition: background 0.12s;
  position: relative;
}

.list-btn:not(:last-child)::after {
  content: '';
  position: absolute;
  bottom: 0; left: 57px; right: 0;
  height: 0.5px;
  background: var(--gray-2);
}

.list-btn:hover  { background: var(--wine-pale); }
.list-btn:active { background: var(--wine-light); }

.list-btn .l-icon {
  width: 34px; height: 34px;
  border-radius: 9px;
  background: var(--wine-light);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.list-btn .l-icon i { font-size: 16px; color: var(--wine); }

.list-btn .l-text { flex: 1; }
.list-btn .l-title { display: block; font-size: 14.5px; font-weight: 500; color: var(--dark); line-height: 1.3; }
.list-btn .l-sub   { display: block; font-size: 12px; color: var(--gray-4); margin-top: 2px; line-height: 1.4; }
.list-btn .l-sub.muted { color: var(--gray-3); font-style: italic; }

.list-btn .l-arrow { color: var(--gray-3); font-size: 17px; flex-shrink: 0; }

/* ── ASESORAMIENTO standalone ── */
.btn-asesoria {
  display: flex;
  align-items: center;
  gap: 13px;
  width: 100%;
  padding: 0.95rem 1rem;
  background: var(--white);
  border: 1.5px solid var(--wine);
  border-radius: var(--radius);
  cursor: pointer;
  text-align: left;
  box-shadow: var(--shadow);
  transition: background 0.12s;
  margin-bottom: 1rem;
}

.btn-asesoria:hover  { background: var(--wine-pale); }
.btn-asesoria:active { background: var(--wine-light); }

.btn-asesoria .a-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--wine);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.btn-asesoria .a-icon i { font-size: 19px; color: #fff; }

.btn-asesoria .a-text { flex: 1; }
.btn-asesoria .a-title { display: block; font-size: 14.5px; font-weight: 500; color: var(--wine); }
.btn-asesoria .a-sub   { display: block; font-size: 12px; color: var(--gray-4); margin-top: 2px; }
.btn-asesoria .a-arrow { color: var(--wine); font-size: 17px; flex-shrink: 0; opacity: 0.6; }

/* ── FOOTER ── */
.footer { text-align: center; margin-top: 2.5rem; }
.footer p { font-size: 11.5px; color: var(--gray-3); letter-spacing: 0.03em; }

/* ══════════════════════════
   MODALES
══════════════════════════ */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 300;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(3px);
}
.overlay.open { display: flex; }

.sheet {
  background: var(--white);
  border-radius: 22px 22px 0 0;
  width: 100%;
  max-width: 430px;
  max-height: 91vh;
  overflow-y: auto;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.14);
  animation: up 0.28s cubic-bezier
